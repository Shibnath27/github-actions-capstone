name: PR Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.11"
      run_tests: true

  pr-comment:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - run: |
            echo "PR checks passed for branch: ${{ github.head_ref }}"


