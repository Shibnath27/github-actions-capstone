# this will deploy the safe / secure / tested app to Prod server
name: Deploy To Server

on: 
    workflow_call:


jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
            DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
            DOCKER_TAG: ${{ github.sha }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: SSH to Prod server & create app folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                 echo "Installing required packages & folders"
                 sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                 sudo usermod -aG docker $USER
                 mkdir -p devops

            - name: Copy the docker-compose file
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml
                target: ~/devops
                
            - name: SSH to Prod server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                envs: DOCKERHUB_USER,DOCKERHUB_TOKEN,GITHUB_SHA
              env:
                   DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
                   DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
                   GITHUB_SHA: ${{ github.sha }}
                
                script: |
                    echo "Running App"
                 
                    SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
                    export DOCKER_TAG="sha-$SHORT_SHA"
                    export DOCKERHUB_USER=$DOCKERHUB_USER
                    export DOCKERHUB_TOKEN=$DOCKERHUB_TOKEN
                    
                    echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login --username ${{ secrets.DOCKERHUB_USER }} --password-stdin
                    cd ~/devops && docker compose down && docker compose up -d --build --force-recreate --pull always